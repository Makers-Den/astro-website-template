# .github/workflows/lh-main.yml
name: Lighthouse Baseline (main)
on:
  push:
    branches: [main]

jobs:
  lighthouse-main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm i -g @lhci/cli@0.14.x jq

      - name: Collect Lighthouse on production
        env:
          BASE_URL: https://template.makersden.dev   # prod Worker route
        run: |
          jq '.ci.collect.url |= map(env.BASE_URL + .)' .lighthouserc.json > lhci.main.json
          lhci collect --config=lhci.main.json --output=json

      - run: mkdir baseline && cp .lighthouseci/*.json baseline/
      - uses: actions/upload-artifact@v4
        with:
          name: lh-baseline
          path: baseline
